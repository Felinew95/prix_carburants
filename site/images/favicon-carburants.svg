<svg width="64" height="64" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <title>Favicon pompe à essence</title>
  
  <!-- Base noire en bas -->
  <rect x="65" y="205" width="70" height="18" rx="2" fill="#1a1a1a"/>
  
  <!-- Corps principal vert -->
  <rect x="55" y="45" width="90" height="165" rx="10" fill="#2ecc71"/>
  
  <!-- Panneau blanc écran -->
  <rect x="70" y="60" width="60" height="50" rx="5" fill="#ffffff"/>
  
  <!-- Lignes affichage grises -->
  <line x1="78" y1="73" x2="122" y2="73" stroke="#d0d0d0" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="88" x2="122" y2="88" stroke="#d0d0d0" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Deux petits boutons verts -->
  <circle cx="82" cy="138" r="4" fill="#1ea853"/>
  <circle cx="118" cy="138" r="4" fill="#1ea853"/>
  
  <!-- Reflet blanc sur la pompe -->
  <rect x="60" y="50" width="5" height="150" fill="white" opacity="0.15" rx="2"/>
</svg>