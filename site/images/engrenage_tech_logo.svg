<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Favicon engrenage</title>
  
  <!-- Dents de l'engrenage -->
  <g fill="#2c3e50">
    <!-- Dent 1 (haut) -->
    <rect x="28" y="4" width="8" height="8" rx="1"/>
    <!-- Dent 2 -->
    <rect x="44" y="12" width="8" height="8" rx="1" transform="rotate(45 48 16)"/>
    <!-- Dent 3 -->
    <rect x="48" y="28" width="8" height="8" rx="1" transform="rotate(90 52 32)"/>
    <!-- Dent 4 -->
    <rect x="44" y="44" width="8" height="8" rx="1" transform="rotate(135 48 48)"/>
    <!-- Dent 5 (bas) -->
    <rect x="28" y="52" width="8" height="8" rx="1" transform="rotate(180 32 56)"/>
    <!-- Dent 6 -->
    <rect x="12" y="44" width="8" height="8" rx="1" transform="rotate(225 16 48)"/>
    <!-- Dent 7 -->
    <rect x="8" y="28" width="8" height="8" rx="1" transform="rotate(270 12 32)"/>
    <!-- Dent 8 -->
    <rect x="12" y="12" width="8" height="8" rx="1" transform="rotate(315 16 16)"/>
  </g>
  
  <!-- Cercle principal -->
  <circle cx="32" cy="32" r="24" fill="#2c3e50" opacity="0.9"/>
  
  <!-- Anneau intérieur -->
  <circle cx="32" cy="32" r="16" fill="#4a7c9e"/>
  
  <!-- Cercle central -->
  <circle cx="32" cy="32" r="8" fill="#ffffff"/>
  
  <!-- Point de reflet -->
  <circle cx="28" cy="28" r="2" fill="#4a7c9e" opacity="0.6"/>
</svg>